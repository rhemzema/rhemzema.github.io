<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>404 | Ruiqian Zhang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="icons/face.svg" type="image/svg+xml">

  <link rel="stylesheet" href="shared.css">

  <style>
    /* ── Layout ─────────────────────────────────────────────── */
    .content-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; box-sizing: border-box; text-align: center;
      position: relative; z-index: 1;
    }

    /* ── Frosted glass card ──────────────────────────────────── */
    .content-backdrop {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 56px; border-radius: 32px;
      position: relative; isolation: isolate;
      background: rgba(242, 240, 239, 0.3);
      box-shadow: 0 0 0 1px rgba(16, 24, 40, 0.05);
    }
    .content-backdrop::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 32px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: -1;
    }
    body.dark .content-backdrop {
      background: rgba(7, 18, 33, 0.3);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.05);
    }
    @media (max-width: 600px) {
      .content-backdrop { background: rgba(242,240,239,0.1); padding: 32px 24px; }
      body.dark .content-backdrop { background: rgba(7,18,33,0.1); }
    }

    /* ── Text animations ─────────────────────────────────────── */
    .error-heading {
      font-size: clamp(24px, 5vw, 36px); font-weight: 800; letter-spacing: -0.5px;
      margin: 0 0 12px; opacity: 0;
      transform: perspective(500px) rotateX(90deg) translateY(10px); transform-origin: bottom center;
      transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .error-heading.visible { opacity: 1; transform: perspective(500px) rotateX(0deg) translateY(0); }

    .error-sub {
      font-size: 15px; color: var(--muted); max-width: 360px;
      line-height: 1.6; margin: 0 0 40px; opacity: 0; transform: translateY(16px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .error-sub.visible { opacity: 1; transform: translateY(0); }

    .btn-row {
      display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-row.visible { opacity: 1; transform: translateY(0); }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 22px; border-radius: 999px;
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      text-decoration: none; cursor: pointer; border: 0;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, background-color 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); transition-duration: 0.1s; }

    .btn-primary {
      background: var(--accent); color: #fff;
      position: relative; padding: 12px 44px 12px 22px;
      transition: transform 0.6s cubic-bezier(0.25,1,0.5,1), box-shadow 0.3s ease, background-color 0.3s ease, padding 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    body.dark .btn-primary { color: var(--bg); }
    @media (hover: hover) { .btn-primary:hover { padding: 12px 22px 12px 44px; } }

    .btn-secondary {
      background: var(--card-bg); color: var(--text); border: 1px solid var(--border);
    }
    @media (hover: hover) {
      .btn-secondary:hover { color: var(--accent); border-color: var(--accent); background: var(--hover-bg); }
    }

    /* Animated arrow swap inside primary button */
    .btn-arrow {
      position: absolute; top: 50%; width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
      pointer-events: none;
    }
    .btn-arrow svg { display: block; width: 14px; height: 14px; }
    .arrow-right { right: 22px; transform: translateY(-50%) translateX(0); opacity: 1; }
    .arrow-left  { left:  22px; transform: translateY(-50%) translateX(-15px); opacity: 0; }
    @media (hover: hover) {
      .btn-primary:hover .arrow-right { transform: translateY(-50%) translateX(15px); opacity: 0; }
      .btn-primary:hover .arrow-left  { transform: translateY(-50%) translateX(0); opacity: 1; }
    }

    /* ── ASCII bounce canvas ─────────────────────────────────── */
    #ascii-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  </style>
</head>
<body>
  <script>
    (function() {
      const s = localStorage.getItem('theme'), d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.body.style.transition = 'none';
      if (s === 'dark' || (!s && d)) document.body.classList.add('dark');
    })();
  </script>

  <div class="top-nav-bg"></div>
  <canvas id="ascii-canvas"></canvas>

  <div class="nav-right-group">
    <button id="theme-toggle" class="icon-btn square" aria-label="Toggle dark mode">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 11.5373 21.3065 11.4608 21.0672 11.8568C19.9289 13.7406 17.8615 15 15.5 15C11.9101 15 9 12.0899 9 8.5C9 6.13845 10.2594 4.07105 12.1432 2.93276C12.5392 2.69347 12.4627 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" fill="currentColor"/>
      </svg>
    </button>
  </div>

  <div class="content-wrap">
    <div class="content-backdrop">
      <div style="display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;">
        <h1 class="error-heading">Erm...</h1>
        <p class="error-sub">I didn't code what you're looking for.<br>Let's head back?</p>
        <div class="btn-row">
          <a href="https://rhemzema.github.io" class="btn btn-primary">
            <div class="btn-arrow arrow-left">
              <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 1L1 7L7 13M1 7H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span>Go home</span>
            <div class="btn-arrow arrow-right">
              <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 1L1 7L7 13M1 7H13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </a>
          <a href="projects.html" class="btn btn-secondary">View projects</a>
        </div>
      </div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    // Entrance
    window.addEventListener('load', () => {
      setTimeout(() => document.querySelector('.error-heading').classList.add('visible'), 200);
      setTimeout(() => document.querySelector('.error-sub').classList.add('visible'),     400);
      setTimeout(() => document.querySelector('.btn-row').classList.add('visible'),       550);
    });

    // ASCII DVD bounce
    (function() {
      const canvas = document.getElementById('ascii-canvas');
      const ctx    = canvas.getContext('2d');
      const IMAGE_URL   = '/Images/monkeyThink.png';
      const isMobile    = () => window.innerWidth < 600;
      const getCols     = () => isMobile() ? 40 : 80;
      const getFontSize = () => isMobile() ? 5 : 7;
      const getLineH    = () => isMobile() ? 6 : 8;

      let ASCII_COLS = getCols(), FONT_SIZE = getFontSize(), LINE_HEIGHT = getLineH();
      const SPEED = 3, FRAME_INTERVAL = 1000 / 25;
      const DENSITY_LIGHT = '@%#*+=-:. ', DENSITY_DARK = ' .:=-+*#%@';
      const COLOR_LIGHT = '#111827', COLOR_DARK = '#93c5fd';

      let lines = [], spriteW = 0, spriteH = 0, x, y, vx, vy, asciiColor;
      let lastTime = 0, ready = false;

      function imageToAscii(img) {
        const density = document.body.classList.contains('dark') ? DENSITY_DARK : DENSITY_LIGHT;
        const rows = Math.round(ASCII_COLS * (img.naturalHeight / img.naturalWidth) * 0.5);
        const off = document.createElement('canvas'); off.width = ASCII_COLS; off.height = rows;
        const octx = off.getContext('2d'); octx.drawImage(img, 0, 0, ASCII_COLS, rows);
        const data = octx.getImageData(0, 0, ASCII_COLS, rows).data, out = [];
        for (let r = 0; r < rows; r++) {
          let line = '';
          for (let c = 0; c < ASCII_COLS; c++) {
            const i = (r * ASCII_COLS + c) * 4;
            const lum = (0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2]) / 255;
            line += lum > 0.85 ? ' ' : density[Math.floor(lum * (density.length - 1))];
          }
          out.push(line);
        }
        return out;
      }

      function cacheColors() { asciiColor = document.body.classList.contains('dark') ? COLOR_DARK : COLOR_LIGHT; }

      function initPosition() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        ASCII_COLS = getCols(); FONT_SIZE = getFontSize(); LINE_HEIGHT = getLineH();
        spriteW = ASCII_COLS * (FONT_SIZE * 0.62); spriteH = lines.length * LINE_HEIGHT;
        x = Math.random() * Math.max(1, canvas.width  - spriteW);
        y = Math.random() * Math.max(1, canvas.height - spriteH);
        const sign = () => Math.random() < 0.5 ? 1 : -1;
        vx = sign() * (SPEED * 0.7 + Math.random() * SPEED * 0.3);
        vy = sign() * (SPEED * 0.7 + Math.random() * SPEED * 0.3);
        cacheColors(); ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function draw(ts) {
        requestAnimationFrame(draw);
        if (!ready || ts - lastTime < FRAME_INTERVAL) return;
        lastTime = ts; ctx.clearRect(0, 0, canvas.width, canvas.height);
        x += vx; y += vy;
        if (x <= 0)                       { x = 0; vx = Math.abs(vx); }
        if (x + spriteW >= canvas.width)  { x = canvas.width - spriteW; vx = -Math.abs(vx); }
        if (y <= 0)                       { y = 0; vy = Math.abs(vy); }
        if (y + spriteH >= canvas.height) { y = canvas.height - spriteH; vy = -Math.abs(vy); }
        ctx.font = `${FONT_SIZE}px "JetBrains Mono","Courier New",monospace`;
        ctx.fillStyle = asciiColor;
        for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], x, y + i * LINE_HEIGHT);
      }

      const img = new Image(); img.crossOrigin = 'anonymous';
      img.onload  = () => { lines = imageToAscii(img); initPosition(); ready = true; };
      img.onerror = () => { lines = ['image not found','check IMAGE_URL','in 404.html']; initPosition(); ready = true; };
      img.src = IMAGE_URL;
      requestAnimationFrame(draw);

      window.addEventListener('resize', () => {
        if (ready) { ASCII_COLS = getCols(); lines = imageToAscii(img); initPosition(); }
      });

      // Re-render ASCII on theme change (shared.js fires 'dark' class toggle)
      document.getElementById('theme-toggle').addEventListener('click', () => {
        requestAnimationFrame(() => { cacheColors(); if (ready) lines = imageToAscii(img); });
      });
    })();
  </script>
</body>
</html>
