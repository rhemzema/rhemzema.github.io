<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Card | Ruiqian Zhang</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="icon" href="icons/face.svg" type="image/svg+xml">

  <link rel="stylesheet" href="shared.css">

  <style>
    /* ── ID card page: no scroll, centered ───────────────────── */
    :root {
      --card-accent: #861F41;
      --card-shadow: rgba(134, 31, 65, 0.3);
    }
    body.dark {
      --card-accent: #E5751F;
      --card-shadow: rgba(229, 117, 31, 0.75);
    }

    body {
      height: 100vh; height: 100dvh;
      overflow: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      box-sizing: border-box;
    }

    /* ── Card wrapper (3-D tilt host) ───────────────────────── */
    .id-card-wrapper {
      perspective: 1000px;
      width: 100%; max-width: 320px;
      margin-bottom: 25px;
      transform-style: preserve-3d;
      z-index: 10; touch-action: none;
    }

    /* ── Physical card ──────────────────────────────────────── */
    .student-id {
      position: relative; width: 100%; aspect-ratio: 0.63;
      background: #fff; border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.1); padding: 30px;
      box-sizing: border-box; display: flex; flex-direction: column; gap: 20px;
      overflow: hidden; transform-style: preserve-3d;
      background-image: radial-gradient(circle at 100% 0%, rgba(134,31,65,0.08) 0%, transparent 30%);
      transition: transform 0.1s linear, box-shadow 0.1s linear;
    }
    body.dark .student-id { border-color: rgba(255,255,255,0.2); }

    /* Glare */
    .id-glare {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 20px; z-index: 20; pointer-events: none; opacity: 0;
      background: linear-gradient(125deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%);
      background-size: 250% 250%; transition: opacity 0.2s ease;
    }

    /* Content layers */
    .id-header { display: flex; justify-content: flex-start; border-bottom: 2px solid var(--card-accent); padding-bottom: 15px; transform: translateZ(20px); }
    .id-logo   { height: 30px; width: auto; display: block; }
    .id-body   { display: flex; flex-direction: column; align-items: center; gap: 25px; flex-grow: 1; transform: translateZ(10px); }

    .id-photo-box {
      width: 140px; height: 170px; background: #f2f0ef;
      border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; display: flex; justify-content: center;
    }
    .id-photo-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.95; }

    .id-info  { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .id-name  { font-size: 22px; font-weight: 700; color: #111; text-align: center; margin: 0 0 10px; }
    .id-field { display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px dashed rgba(16,24,40,0.1); padding-bottom: 4px; }
    .id-label { color: #6b7280; font-weight: 500; font-size: 11px; text-transform: uppercase; }
    .id-value { color: #111; font-weight: 600; text-align: right; }

    .id-footer { margin-top: auto; padding-top: 10px; transform: translateZ(5px); }
    .barcode   { height: 20px; width: 100%; opacity: 0.6; background: repeating-linear-gradient(90deg, #111 0, #111 2px, transparent 2px, transparent 5px, #111 5px, #111 7px, transparent 7px, transparent 10px); }

    /* ── Controls ────────────────────────────────────────────── */
    .ui-container {
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      z-index: 100; opacity: 0; transition: opacity 0.8s ease 0.4s;
    }
    .page-loaded .ui-container { opacity: 1; }
    .icon-row { display: flex; gap: 16px; }

    /* ── Spin animation ──────────────────────────────────────── */
    @keyframes spin-y {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }
    .spin-360 { animation: spin-y 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    /* ── Mobile ──────────────────────────────────────────────── */
    @media (max-width: 768px) {
      body { padding-bottom: 4vh; padding-left: 15px; padding-right: 15px; }
      .id-card-wrapper { margin-bottom: 20px; max-width: 250px; }
      .id-header { padding-bottom: 10px; }
      .id-header img { width: 70%; height: 70%; transform: translateX(-22px); }
      .student-id { padding: 15px; }
      .id-photo-box { width: 95px; height: 110px; }
      .barcode { height: 12px; }
      .id-name  { font-size: 16px; }
    }
  </style>
</head>
<body>
  <script>
    (function() {
      const s = localStorage.getItem('theme'), d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.body.style.transition = 'none';
      if (s === 'dark' || (!s && d)) document.body.classList.add('dark');
    })();
  </script>

  <div class="id-card-wrapper reveal-flip" id="id-wrapper">
    <div class="student-id" id="id-card">
      <div class="id-glare" id="id-glare"></div>

      <div class="id-header">
        <img src="/logos/Virginia_Tech_logo.svg" class="id-logo" alt="Virginia Tech">
      </div>

      <div class="id-body">
        <div class="id-photo-box">
          <img src="/Images/Ruiqian.jpg" alt="Profile">
        </div>
        <div class="id-info">
          <h3 class="id-name">Ruiqian (Rhema) Zhang</h3>
          <div class="id-field"><span class="id-label">Age:</span>  <span class="id-value">20</span></div>
          <div class="id-field"><span class="id-label">Major:</span><span class="id-value">Electrical Engineering</span></div>
          <div class="id-field" style="border-bottom:none"><span class="id-label">Hometown:</span><span class="id-value">China</span></div>
          <div class="barcode"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="ui-container">
    <div class="icon-row">
      <a href="projects.html" class="icon-btn square" aria-label="Go Back">
        <div class="icon-mask back-icon"></div>
      </a>
      <a href="https://rhemzema.github.io" class="icon-btn square" aria-label="Go to Home">
        <div class="icon-mask home-icon"></div>
      </a>
      <button id="theme-toggle" class="icon-btn square" aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 22C17.5228 22 22 17.5228 22 12C22 11.5373 21.3065 11.4608 21.0672 11.8568C19.9289 13.7406 17.8615 15 15.5 15C11.9101 15 9 12.0899 9 8.5C9 6.13845 10.2594 4.07105 12.1432 2.93276C12.5392 2.69347 12.4627 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
    // Entrance animation
    window.addEventListener('load', () => {
      setTimeout(() => document.body.style.transition = '', 100);
      setTimeout(() => document.getElementById('id-wrapper').classList.add('visible'), 100);
      requestAnimationFrame(() => document.body.classList.add('page-loaded'));
    });

    // Card tilt / touch spin
    const wrap  = document.getElementById('id-wrapper');
    const card  = document.getElementById('id-card');
    const glare = document.getElementById('id-glare');

    let rt;
    function updateCard(rx, ry, px, py) {
      card.style.transform    = `rotateX(${rx}deg) rotateY(${ry}deg)`;
      const shadowColor       = getComputedStyle(document.body).getPropertyValue('--card-shadow');
      card.style.boxShadow    = `${-ry * 2}px ${rx * 2}px 30px ${shadowColor}`;
      glare.style.opacity     = '1';
      glare.style.backgroundPosition = `${px * 100}% ${py * 100}%`;
    }
    function resetCard() {
      card.style.transition = 'transform 0.5s ease, box-shadow 0.5s ease';
      card.style.transform  = 'rotateX(0) rotateY(0)';
      card.style.boxShadow  = 'none';
      glare.style.opacity   = '0';
    }
    function handleInteract(clientX, clientY) {
      card.style.transition = 'none';
      const rect = wrap.getBoundingClientRect();
      const pctX = Math.max(0, Math.min(1, (clientX - rect.left)  / rect.width));
      const pctY = Math.max(0, Math.min(1, (clientY - rect.top)   / rect.height));
      updateCard((pctY - 0.5) * -24, (pctX - 0.5) * 24, pctX, pctY);
    }

    wrap.addEventListener('mousemove', e => handleInteract(e.clientX, e.clientY));
    wrap.addEventListener('mouseleave', resetCard);

    let ts = {};
    wrap.addEventListener('touchstart', e => {
      card.style.transition = 'none';
      ts = { t: Date.now(), x: e.touches[0].clientX, y: e.touches[0].clientY };
    }, { passive: true });
    wrap.addEventListener('touchmove', e => { if (e.cancelable) e.preventDefault(); handleInteract(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    wrap.addEventListener('touchend', e => {
      const dist = Math.hypot(e.changedTouches[0].clientX - ts.x, e.changedTouches[0].clientY - ts.y);
      if (Date.now() - ts.t < 250 && dist < 20) {
        card.style.transform = ''; card.style.transition = 'none';
        card.classList.add('spin-360');
        setTimeout(() => { card.classList.remove('spin-360'); resetCard(); }, 600);
      } else { resetCard(); }
    });
    wrap.addEventListener('touchcancel', resetCard);
  </script>
</body>
</html>
